name: Auto Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    # Skip if commit is from bot (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.author.name, 'github-actions')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE '^(feat!|BREAKING)'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE '^feat'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version in Cargo.toml
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          BUMP="${{ steps.bump.outputs.type }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW}\"/" Cargo.toml
          
          echo "old=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v${NEW}" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT → $NEW ($BUMP)"

      - name: Commit version bump
        run: |
          git add Cargo.toml
          git commit -m "chore: release v${{ steps.version.outputs.new }} [skip ci]"

      - name: Create tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push commit + tag
        run: git push origin master --follow-tags
